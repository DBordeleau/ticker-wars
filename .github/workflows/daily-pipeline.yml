name: Daily Pipeline

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:
    inputs:
      warren_buffbot_enabled:
        description: "Enable Warren Buffbot for this run"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      include_timesfm:
        description: "Install and run TimesFM for this manual run"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      include_chronos:
        description: "Install and run Chronos-2 for this manual run"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  ingest-prices:
    name: Ingest latest daily prices
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MARKET_DATA_SOURCE: yfinance
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify required secrets
        shell: bash
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_SECRET_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required secret::$name is not configured."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Ingest missing daily closes
        run: python -m pipeline.cli ingest-latest-prices

  run-pipeline:
    name: Run downstream horizon prediction pipeline
    needs: ingest-prices
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MARKET_DATA_SOURCE: yfinance
      EXPORT_DIR: data_exports
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'groq' }}
      WARREN_BUFFBOT_ENABLED: ${{ inputs.warren_buffbot_enabled || vars.WARREN_BUFFBOT_ENABLED || 'true' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.1-8b-instant' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TIMESFM_ENABLED: ${{ inputs.include_timesfm || vars.TIMESFM_ENABLED || 'true' }}
      TIMESFM_MODEL_ID: ${{ vars.TIMESFM_MODEL_ID || 'google/timesfm-2.5-200m-pytorch' }}
      TIMESFM_CONTEXT_LENGTH: ${{ vars.TIMESFM_CONTEXT_LENGTH || '1024' }}
      TIMESFM_BACKEND: ${{ vars.TIMESFM_BACKEND || 'torch' }}
      CHRONOS_ENABLED: ${{ inputs.include_chronos || vars.CHRONOS_ENABLED || 'true' }}
      CHRONOS_MODEL_ID: ${{ vars.CHRONOS_MODEL_ID || 'amazon/chronos-2' }}
      CHRONOS_CONTEXT_LENGTH: ${{ vars.CHRONOS_CONTEXT_LENGTH || '1024' }}
      CHRONOS_DEVICE_MAP: ${{ vars.CHRONOS_DEVICE_MAP || 'cpu' }}
      CHRONOS_FREQUENCY: ${{ vars.CHRONOS_FREQUENCY || 'B' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify required secrets
        shell: bash
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_SECRET_KEY SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required secret::$name is not configured."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install TimesFM dependencies
        if: ${{ env.TIMESFM_ENABLED == 'true' }}
        run: python -m pip install -e ".[timesfm]"

      - name: Install Chronos-2 dependencies
        if: ${{ env.CHRONOS_ENABLED == 'true' }}
        run: python -m pip install -e ".[chronos]"

      - name: Run focused validation tests
        run: |
          python -m pytest \
            tests/test_config.py \
            tests/test_prediction_contract.py \
            tests/test_metrics.py \
            tests/test_scoring.py \
            tests/test_dashboard_contract.py \
            tests/test_database_access.py \
            tests/test_cli_smoke.py

      - name: Run downstream daily pipeline
        run: python -m pipeline.cli run-daily --skip-price-ingestion

      - name: Upload dashboard snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-snapshots
          path: data_exports/*.json
          if-no-files-found: ignore
          retention-days: 14
